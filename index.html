<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This Moment — Chase God</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B2A4A;
    --gold: #C9A84C;
    --gold-light: #C9A84C22;
    --gold-border: #C9A84C55;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-hint: #aaa;
    --bg: #ffffff;
    --bg-surface: #f7f6f2;
    --border: rgba(0,0,0,0.12);
    --border-med: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --text: #f0ede6;
      --text-muted: #aaa;
      --text-hint: #666;
      --bg: #141414;
      --bg-surface: #1e1e1e;
      --border: rgba(255,255,255,0.1);
      --border-med: rgba(255,255,255,0.2);
    }
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.25rem 4rem;
  }

  .wrap {
    width: 100%;
    max-width: 520px;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 0.35rem;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .divider {
    width: 36px;
    height: 2px;
    background: var(--gold);
    margin: 1rem auto 0;
  }

  .date-row {
    text-align: center;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--text-hint);
    text-transform: uppercase;
    margin-bottom: 1.75rem;
  }

  .progress {
    display: flex;
    gap: 7px;
    justify-content: center;
    margin-bottom: 2.25rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-med);
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: var(--gold); transform: scale(1.4); }
  .dot.done { background: var(--navy); }

  .step { display: none; }
  .step.active { display: block; }

  .prompt-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 1.25rem;
    text-align: center;
  }

  .prompt-label span { color: var(--gold); }

  textarea {
    width: 100%;
    min-height: 130px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text);
    background: var(--bg);
    resize: vertical;
    line-height: 1.65;
    transition: border-color 0.2s;
    display: block;
    -webkit-appearance: none;
  }

  textarea:focus {
    outline: none;
    border-color: var(--gold);
  }

  textarea::placeholder {
    color: var(--text-hint);
    font-style: italic;
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.1rem;
  }

  .btn {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.07em;
    padding: 0.6rem 1.4rem;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.15s;
    border: 0.5px solid var(--border-med);
    background: transparent;
    color: var(--text-muted);
    -webkit-appearance: none;
  }

  .btn:hover { background: var(--bg-surface); }

  .btn.primary {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }

  .btn.primary:hover { opacity: 0.88; }

  .btn-group { display: flex; gap: 8px; }

  .skip-btn {
    font-size: 12px;
    color: var(--text-hint);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    text-decoration: underline;
    text-underline-offset: 3px;
    padding: 0;
  }

  .skip-btn:hover { color: var(--text-muted); }

  .complete { display: none; text-align: center; padding: 0.5rem 0 2rem; }

  .stone-icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 1.25rem;
    background: var(--gold-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 0.5px solid var(--gold-border);
  }

  .complete-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .verse {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 2rem;
    line-height: 1.55;
  }

  .summary {
    text-align: left;
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.25rem 0.25rem;
    margin-bottom: 1.5rem;
  }

  .summary-item { margin-bottom: 1.1rem; }

  .summary-q {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .summary-a {
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.6;
  }

  .actions { display: flex; flex-direction: column; gap: 10px; }

  .action-btn {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.07em;
    padding: 0.8rem;
    border-radius: var(--radius-md);
    cursor: pointer;
    border: 0.5px solid var(--border-med);
    background: var(--bg);
    color: var(--text);
    width: 100%;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .action-btn:hover { background: var(--bg-surface); }

  .action-btn.primary-action {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }

  .action-btn.primary-action:hover { opacity: 0.88; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--navy);
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    padding: 0.55rem 1.25rem;
    border-radius: var(--radius-md);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--text-hint);
    text-transform: uppercase;
  }

  .footer a {
    color: var(--gold);
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="brand">Chase God</div>
    <div class="title">This Moment</div>
    <div class="subtitle">Don't let this fade</div>
    <div class="divider"></div>
  </div>

  <div class="date-row" id="dateRow"></div>
  <div class="progress" id="progressDots"></div>

  <div id="stepsContainer"></div>

  <div class="complete" id="completeView">
    <div class="stone-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v10l9 5 9-5V7z"/>
        <path d="M12 12l9-5M12 12v10M12 12L3 7"/>
      </svg>
    </div>
    <div class="complete-title">Moment marked.</div>
    <div class="verse">"Don't let this fade."<br>— 1 Samuel 7:12</div>
    <div class="summary" id="summaryBlock"></div>
    <div class="actions">
      <button class="action-btn primary-action" id="copyBtn">Copy to clipboard</button>
      <button class="action-btn" id="emailBtn">Send to my email</button>
      <button class="action-btn" onclick="restart()">Start again</button>
    </div>
  </div>

  <div class="footer">
    <a href="https://chasegod.org">chasegod.org</a>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const prompts = [
  {
    q: "What did you sense God saying specifically to you tonight?",
    placeholder: "Write in your own words, as honestly as you can...",
    key: "word"
  },
  {
    q: "What is one thing you know now that you didn't walk in knowing?",
    placeholder: "Even a small shift counts...",
    key: "knew"
  },
  {
    q: "What do you need to do differently this week because of tonight?",
    placeholder: "Be specific — a name, a habit, a decision...",
    key: "action"
  }
];

const answers = {};
let current = 0;

function getDate() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function buildDots() {
  const c = document.getElementById('progressDots');
  c.innerHTML = '';
  prompts.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    c.appendChild(d);
  });
}

function updateDots(active) {
  prompts.forEach((_, i) => {
    const d = document.getElementById('dot-' + i);
    d.className = 'dot' + (i < active ? ' done' : i === active ? ' active' : '');
  });
}

function buildSteps() {
  const c = document.getElementById('stepsContainer');
  c.innerHTML = '';
  prompts.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'eb-step step';
    div.id = 'step-' + i;
    const words = p.q.split(' ');
    const highlighted = '<span>' + words.slice(0,4).join(' ') + '</span> ' + words.slice(4).join(' ');
    div.innerHTML = `
      <div class="prompt-label">${highlighted}</div>
      <textarea id="ans-${i}" placeholder="${p.placeholder}"></textarea>
      <div class="nav">
        <button class="skip-btn" onclick="skipStep(${i})">skip this question</button>
        <div class="btn-group">
          ${i > 0 ? `<button class="btn" onclick="goTo(${i-1})">Back</button>` : '<span></span>'}
          <button class="btn primary" onclick="nextStep(${i})">${i < prompts.length - 1 ? 'Next' : 'Set the stone'}</button>
        </div>
      </div>
    `;
    c.appendChild(div);
  });
}

function goTo(i) {
  document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
  const s = document.getElementById('step-' + i);
  if (s) s.classList.add('active');
  document.getElementById('completeView').style.display = 'none';
  document.getElementById('stepsContainer').style.display = '';
  document.getElementById('progressDots').style.display = 'flex';
  current = i;
  updateDots(i);
  setTimeout(() => {
    const ta = document.getElementById('ans-' + i);
    if (ta) ta.focus();
  }, 60);
}

function nextStep(i) {
  const val = (document.getElementById('ans-' + i).value || '').trim();
  answers[prompts[i].key] = val;
  if (i < prompts.length - 1) {
    goTo(i + 1);
  } else {
    showComplete();
  }
}

function skipStep(i) {
  answers[prompts[i].key] = '';
  if (i < prompts.length - 1) {
    goTo(i + 1);
  } else {
    showComplete();
  }
}

function showComplete() {
  document.getElementById('stepsContainer').style.display = 'none';
  document.getElementById('progressDots').style.display = 'none';
  const cv = document.getElementById('completeView');
  cv.style.display = 'block';
  const sb = document.getElementById('summaryBlock');
  sb.innerHTML = '';
  prompts.forEach(p => {
    const val = answers[p.key];
    if (!val) return;
    const item = document.createElement('div');
    item.className = 'summary-item';
    item.innerHTML = `<div class="summary-q">${p.q.replace('?','')}</div><div class="summary-a">${escHtml(val)}</div>`;
    sb.appendChild(item);
  });
}

function buildCopyText() {
  let t = `THIS MOMENT — ${getDate()}\n"Don't let this fade." — 1 Samuel 7:12\nchasegod.org\n\n`;
  prompts.forEach(p => {
    const val = answers[p.key];
    if (!val) return;
    t += `${p.q}\n${val}\n\n`;
  });
  return t.trim();
}

document.getElementById('copyBtn').addEventListener('click', () => {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(buildCopyText()).then(() => showToast('Copied to clipboard'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = buildCopyText();
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard');
  }
});

document.getElementById('emailBtn').addEventListener('click', () => {
  const body = encodeURIComponent(buildCopyText());
  const subject = encodeURIComponent('This Moment — ' + getDate());
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
});

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  prompts.forEach((_, i) => {
    const ta = document.getElementById('ans-' + i);
    if (ta) ta.value = '';
  });
  goTo(0);
}

document.getElementById('dateRow').textContent = getDate();
buildDots();
buildSteps();
goTo(0);
</script>
</body>
</html>
